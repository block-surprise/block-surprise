<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブロックサプライズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
    --primary:#007AFF;
    --bg:#F5F7FB;
    --card:#FFFFFF;
    --text:#111827;
    --sub:#6B7280;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:"Noto Sans JP",sans-serif;
    background:var(--bg);
    color:var(--text);
    padding-bottom:90px;
}
.header{
    background:linear-gradient(135deg,#007AFF,#38B6FF);
    color:white;
    padding:40px 24px;
    border-radius:0 0 28px 28px;
}
.logo{
    width:72px;
    height:72px;
    background:white;
    color:#007AFF;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    margin-bottom:16px;
}
.title{
    font-size:2rem;
    font-weight:700;
}
.subtitle{
    opacity:.9;
    margin-top:8px;
}
.container{
    padding:20px;
}
.section{
    margin-top:28px;
}
.section-title{
    font-size:1.3rem;
    margin-bottom:14px;
}
.quick-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}
.quick-card{
    background:var(--card);
    padding:18px;
    border-radius:18px;
    text-decoration:none;
    color:inherit;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.quick-icon{
    font-size:30px;
    margin-bottom:10px;
}
.quick-name{
    font-weight:700;
}
.quick-desc{
    font-size:.85rem;
    color:var(--sub);
}
.article{
    display:flex;
    gap:14px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    text-decoration:none;
    color:inherit;
    margin-bottom:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}
.article img{
    width:120px;
    height:100px;
    object-fit:cover;
}
.article-content{
    padding:12px;
    flex:1;
}
.article-title{
    font-weight:700;
    margin-bottom:8px;
}
.article-desc{
    font-size:.85rem;
    color:var(--sub);
}
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:12px 0;
    box-shadow:0 -3px 12px rgba(0,0,0,.08);
}
.bottom-nav a{
    text-decoration:none;
    color:#555;
    font-size:.9rem;
}
</style>
</head>
<body>
<div class="header">
    <div class="logo">🧱</div>
    <div class="title">ブロックサプライズ</div>
    <div class="subtitle">
        運営サイトや最新記事をまとめてチェック
    </div>
</div>
<div class="container">
<section class="section">
<h2 class="section-title">おすすめサイト</h2>
<div class="quick-grid">
<a href="https://blocksurprise.f5.si/" class="quick-card">
<div class="quick-icon">🌐</div>
<div class="quick-name">公式サイト</div>
<div class="quick-desc">ブロックサプライズ公式</div>
</a>
<a href="https://crafters.blocksurprise.f5.si/" class="quick-card">
<div class="quick-icon">📰</div>
<div class="quick-name">クラフターズ</div>
<div class="quick-desc">Minecraft記事サイト</div>
</a>
<a href="https://games.ad-hub.f5.si/" class="quick-card">
<div class="quick-icon">🎮</div>
<div class="quick-name">ゲームセンター</div>
<div class="quick-desc">30種類以上のゲーム</div>
</a>
<a href="https://www.surge.f5.si/" class="quick-card">
<div class="quick-icon">🔍</div>
<div class="quick-name">SURGE検索</div>
<div class="quick-desc">検索エンジン</div>
</a>
</div>
</section>
<section class="section">
<h2 class="section-title">最新記事</h2>
<a href="#" class="article">
<img src="p/005.png">
<div class="article-content">
<div class="article-title">
エンダードラゴン討伐までの最短ルート
</div>
<div class="article-desc">
ネザー進出からエンド攻略までを解説
</div>
</div>
</a>
<a href="#" class="article">
<img src="p/004.png">
<div class="article-content">
<div class="article-title">
マイクラ サバイバルの始め方
</div>
<div class="article-desc">
1日目から効率よく進める方法
</div>
</div>
</a>
<a href="#" class="article">
<img src="cherry.jpg">
<div class="article-content">
<div class="article-title">
和風モダン建築の極意
</div>
<div class="article-desc">
サクラ材を使った建築テクニック
</div>
</div>
</a>
</section>
</div>
<nav class="bottom-nav">
<a href="#">🏠<br>ホーム</a>
<a href="promo.html">🌐<br>サイト</a>
<a href="crafters.html">📰<br>記事</a>
<a href="#">⚙️<br>設定</a>
</nav>
</body>
</html>
