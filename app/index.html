<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockSurprise App</title>
<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}
header{
    background:#007aff;
    color:white;
    padding:20px;
    text-align:center;
}
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}
.section{
    margin-bottom:40px;
}
.section h2{
    margin-bottom:15px;
}
.card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-decoration:none;
    color:black;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
    transition:.2s;
}
.card:hover{
    transform:translateY(-3px);
}
.more{
    display:inline-block;
    margin-top:15px;
    color:#007aff;
    text-decoration:none;
    font-weight:bold;
}
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:12px;
    box-shadow:0 -2px 8px rgba(0,0,0,.1);
}
.bottom-nav a{
    text-decoration:none;
    color:#333;
}
</style>
</head>
<body>
<header>
    <h1>BlockSurprise</h1>
</header>
<div class="container">
<section class="section">
    <h2>🌐 運営サイト</h2>
<div class="card-grid">
    <a class="card" href="https://blocksurprise.f5.si/">
        <h3>ブロックサプライズ公式サイト</h3>
        <p>公式サイト</p>
    </a>
    <a class="card" href="https://crafters.blocksurprise.f5.si">
        <h3>クラフターズノート</h3>
        <p>Minecraft記事サイト</p>
    </a>
    <a class="card" href="https://games.ad-hub.f5.si">
        <h3>ミニゲームセンター</h3>
        <p>30種類以上のゲーム</p>
    </a>
    <a class="card" href="https://kuraberukun.f5.si">
        <h3>くらべる君</h3>
        <p>比較ツール</p>
    </a>
</div>
<a class="more" href="promo.html">もっと見る →</a>
</section>
<section class="section">
    <h2>📰 クラフターズ最新記事</h2>
<div class="card-grid">
    <div class="card">
        <h3>エンダードラゴン討伐までの最短ルート</h3>
    </div>
    <div class="card">
        <h3>マイクラ サバイバルの始め方</h3>
    </div>
    <div class="card">
        <h3>サクラ材で創る和風モダン建築</h3>
    </div>
    <div class="card">
        <h3>アイアンゴーレム倒し方講座</h3>
    </div>
</div>
<a class="more" href="crafters.html">もっと見る →</a>
</section>
</div>
<nav class="bottom-nav">
    <a href="index.html">🏠 ホーム</a>
    <a href="promo.html">🌐 サイト</a>
    <a href="crafters.html">📰 記事</a>
</nav>
</body>
</html>
