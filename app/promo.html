<script>
const searchInput =
document.getElementById("searchInput");
const cards =
document.querySelectorAll(".site-card");
searchInput.addEventListener(
"input",
function(){
const keyword =
this.value.toLowerCase();
cards.forEach(card=>{
const text =
card.textContent.toLowerCase();
card.style.display =
text.includes(keyword)
? "flex"
: "none";
});
});
